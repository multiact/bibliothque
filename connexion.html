<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La bibliothèque de Valence</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='icone.png') }}">
</head>

<body>

<header class="topbar">

<div class="brand">
<div class="logo">📚</div>

<div>
<div class="brand-title">Bibliothèque de Valence</div>
<div class="brand-subtitle">Centre-ville</div>
</div>
</div>

<nav class="nav">

<a class="nav-link" href="{{ url_for('home') }}">Accueil</a>

<div class="dropdown">

<button class="nav-link dropbtn" id="catalogueBtn">
Catalogue ▾
</button>

<div class="dropdown-content" id="catalogueMenu">

<div class="submenu">

<button class="submenu-title">
Livres ▸
</button>

<div class="submenu-content">

<a href="{{ url_for('catalogue', categorie='romans') }}">Romans</a>

<a href="{{ url_for('catalogue', categorie='bd') }}">BD / Mangas</a>

<a href="{{ url_for('catalogue', categorie='jeunesse') }}">Jeunesse</a>

<a href="{{ url_for('catalogue', categorie='documentaires') }}">Documentaires</a>

</div>
</div>


<div class="submenu">

<button class="submenu-title">
Autres médias ▸
</button>

<div class="submenu-content">

<a href="{{ url_for('catalogue', categorie='cd') }}">CD</a>

<a href="{{ url_for('catalogue', categorie='dvd') }}">DVD</a>

<a href="{{ url_for('catalogue', categorie='jeux') }}">Jeux de société</a>

</div>
</div>

</div>
</div>


<a class="nav-link" href="{{ url_for('reserver') }}">Réserver un livre</a>

<a class="nav-link" href="{{ url_for('rendre') }}">Rendre un livre</a>

<a class="nav-link nav-cta" href="{{ url_for('connexion') }}">Connexion</a>

</nav>

</header>


<main class="container">

<section class="hero">
    <h1>Bienvenue à la bibliothèque de Valence</h1>
    <p>Bibliothèque du centre ville</p>

    <div class="connexion-page">

        <div class="form-box">
            <h2>Créer un compte</h2>

            <form method="POST" action="{{ url_for('creer_compte') }}">
                <div class="form-grid">

                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" required>
                    </div>

                    <div class="form-group">
                        <label for="nom_utilisateur">Nom d'utilisateur</label>
                        <input type="text" id="nom_utilisateur" name="nom_utilisateur" required>
                    </div>

                    <div class="form-group">
                        <label for="date_naissance">Date de naissance</label>
                        <input type="date" id="date_naissance" name="date_naissance" required>
                    </div>

                    <div class="form-group">
                        <label for="code_postal">Code postal</label>
                        <input type="text" id="code_postal" name="code_postal" required>
                    </div>

                    <div class="form-group full">
                        <label for="email_creation">Email</label>
                        <input type="email" id="email_creation" name="email" required>
                    </div>

                    <div class="form-group full">
                        <label for="password_creation">Mot de passe</label>
                        <input type="password" id="password_creation" name="password" required>
                    </div>

                    <div class="form-group full">
                        <button type="submit">Créer le compte</button>
                    </div>

                </div>
            </form>
        </div>

        <div class="separator">OU</div>

        <div class="form-box">
            <h2>Connexion</h2>

            <form method="POST" action="{{ url_for('connexion') }}" class="connexion-simple">

                <div class="form-group">
                    <label for="email_connexion">Email</label>
                    <input type="email" id="email_connexion" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password_connexion">Mot de passe</label>
                    <input type="password" id="password_connexion" name="password" required>
                </div>

                <div class="form-group">
                    <button type="submit">Connexion</button>
                </div>

            </form>
        </div>

    </div>
</section>

</main>


<footer class="footer">

<p>2026 Bibliothèque de Valence</p>

</footer>


<script>

const btn = document.getElementById("catalogueBtn");
const menu = document.getElementById("catalogueMenu");

btn.addEventListener("click", function(e){

e.stopPropagation();

menu.classList.toggle("open");

});

document.addEventListener("click", function(){

menu.classList.remove("open");

});

menu.addEventListener("click", function(e){

e.stopPropagation();

});


document.querySelectorAll(".submenu").forEach(function(submenu){

const title = submenu.querySelector(".submenu-title");

title.addEventListener("click", function(e){

e.stopPropagation();

submenu.classList.toggle("open");

});

});

</script>

</body>

</html>
