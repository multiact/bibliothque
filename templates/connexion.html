[% extends "base.html" %]

[% block title %]Connexion - Bibliothèque[% endblock %]

[% block content %]
<h1>Mon compte</h1>
<p>Connecte-toi ou crée un compte.</p>

[% if erreur %]
<div class="message-erreur">[[ erreur ]]</div>
[% endif %]

<div class="bloc-connexion">
    <div class="formulaire">
        <h2>Créer un compte</h2>
        <form method="POST" action="[[ url_for('creer_compte') ]]">
            <input type="hidden" name="next" value="[[ prochain ]]">
            <div class="grille-formulaire">
                <div class="champ-formulaire">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" required>
                </div>
                <div class="champ-formulaire">
                    <label for="nom_utilisateur">Nom d'utilisateur</label>
                    <input type="text" id="nom_utilisateur" name="nom_utilisateur" required>
                </div>
                <div class="champ-formulaire">
                    <label for="date_naissance">Date de naissance</label>
                    <input type="date" id="date_naissance" name="date_naissance" required>
                </div>
                <div class="champ-formulaire">
                    <label for="code_postal">Code postal</label>
                    <input type="text" id="code_postal" name="code_postal" required>
                </div>
                <div class="champ-formulaire grand">
                    <label for="email_creation">Adresse mail</label>
                    <input type="email" id="email_creation" name="email" required>
                </div>
                <div class="champ-formulaire grand">
                    <label for="motdepasse_creation">Mot de passe</label>
                    <input type="password" id="motdepasse_creation" name="password" required>
                </div>
                <div class="champ-formulaire grand">
                    <button type="submit">Créer le compte</button>
                </div>
            </div>
        </form>
    </div>

    <div class="separation">OU</div>

    <div class="formulaire">
        <h2>Connexion</h2>
        <form method="POST" action="[[ url_for('connexion') ]]" class="formulaire-simple">
            <input type="hidden" name="next" value="[[ prochain ]]">
            <div class="champ-formulaire">
                <label for="email_connexion">Adresse mail</label>
                <input type="text" id="email_connexion" name="email" required>
            </div>
            <div class="champ-formulaire">
                <label for="motdepasse_connexion">Mot de passe</label>
                <input type="password" id="motdepasse_connexion" name="password" required>
            </div>
            <div class="champ-formulaire">
                <button type="submit">Se connecter</button>
            </div>
        </form>
    </div>
</div>
[% endblock %]
